<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="game-area">
            <div id="game-wrapper">
                <canvas id="snake-canvas"></canvas>
                <div id="overlay"></div>
                <button id="pause-btn" title="暂停 / 继续">⏸️</button>
                <button id="quit-btn" title="退出游戏">✕</button>
            </div>
        </div>
        <div id="ad-banner">这里是广告：小鸡毛大王</div>
    </div>

    <script>
    class SnakeGame {
        static TILE_COUNT = 25;

        static DIFFICULTY = {
            easy: {
                label: '简单',
                wallCount: [0, 0],
                wallMode: 'connected',
                wallSegLen: [4, 8],
                speed: 150,
            },
            medium: {
                label: '中级',
                wallCount: [1, 1],
                wallMode: 'connected',
                wallSegLen: [4, 8],
                speed: 130,
            },
            hard: {
                label: '困难',
                wallCount: [2, 2],
                wallMode: 'connected',
                wallSegLen: [4, 8],
                speed: 110,
            },
            hell: {
                label: '地狱',
                wallCount: [3, 3],
                wallMode: 'connected',
                wallSegLen: [4, 8],
                speed: 85,
            },
        };

        constructor() {
            this.canvas = document.getElementById('snake-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.overlay = document.getElementById('overlay');

            this.tileCount = SnakeGame.TILE_COUNT;
            this.tileSize = 0;

            this.snake = [];
            this.walls = [];
            this.food = { x: 0, y: 0 };
            this.direction = { x: 0, y: 0 };
            this.nextDirection = { x: 0, y: 0 };
            this.score = 0;
            this.state = 'initial';
            this.isPaused = false;
            this.gameLoopId = null;
            this.difficulty = this.loadDifficulty();
            this.speed = SnakeGame.DIFFICULTY[this.difficulty].speed;

            // Device detection — 用于自适应 UI 文案（必须在 showInitialOverlay 之前）
            const ua = navigator.userAgent || '';
            this.isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua)
                         || (navigator.maxTouchPoints > 1 && /Macintosh/i.test(ua));

            this.resizeCanvas();
            this.resetState();
            this.render();
            this.showInitialOverlay();

            window.addEventListener('keydown', (e) => this.handleKeyDown(e));
            window.addEventListener('resize', () => this.resizeCanvas());

            // Pause button
            this.pauseBtn = document.getElementById('pause-btn');
            this.pauseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                this.togglePause();
            });

            // Quit button
            this.quitBtn = document.getElementById('quit-btn');
            this.quitBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                this.restart();
            });

            // Touch support — swipe on canvas
            this.touchStartPos = null;
            this.touchStartTime = 0;
            this.canvas.addEventListener('touchstart', (e) => this._onTouchStart(e), { passive: false });
            this.canvas.addEventListener('touchmove', (e) => this._onTouchMove(e), { passive: false });
            this.canvas.addEventListener('touchend', (e) => this._onTouchEnd(e), { passive: false });

            // AudioContext — 延迟初始化（浏览器要求用户交互后才能创建）
            this.audioCtx = null;
        }

        // 确保 AudioContext 已创建（需在用户手势后调用）
        // 返回 AudioContext 实例，失败返回 null（老浏览器静默降级）
        _ensureAudio() {
            if (!this.audioCtx) {
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) {
                        this.audioCtx = new AC();
                    }
                } catch {
                    this.audioCtx = null;
                }
            }
            return this.audioCtx;
        }

        // 吃食物音效：短促上升音
        playEatSound() {
            const ctx = this._ensureAudio();
            if (!ctx) return;
            const now = ctx.currentTime;

            // 第一音：中频 440Hz，持续 60ms
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.type = 'square';
            osc1.frequency.setValueAtTime(440, now);
            osc1.frequency.linearRampToValueAtTime(880, now + 0.06);
            gain1.gain.setValueAtTime(0.12, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc1.connect(gain1).connect(ctx.destination);
            osc1.start(now);
            osc1.stop(now + 0.08);

            // 第二音：高频 660Hz，延迟 50ms 叠加
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(660, now + 0.05);
            osc2.frequency.linearRampToValueAtTime(1320, now + 0.12);
            gain2.gain.setValueAtTime(0.10, now + 0.05);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.14);
            osc2.connect(gain2).connect(ctx.destination);
            osc2.start(now + 0.05);
            osc2.stop(now + 0.14);
        }

        // 死亡音效：下降低频
        playDeathSound() {
            const ctx = this._ensureAudio();
            if (!ctx) return;
            const now = ctx.currentTime;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.35);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.4);

            // 低频轰隆
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(60, now);
            osc2.frequency.linearRampToValueAtTime(30, now + 0.3);
            gain2.gain.setValueAtTime(0.2, now);
            gain2.gain.linearRampToValueAtTime(0.01, now + 0.35);
            osc2.connect(gain2).connect(ctx.destination);
            osc2.start(now);
            osc2.stop(now + 0.35);
        }

        // 开始音效：短促提示
        playStartSound() {
            const ctx = this._ensureAudio();
            if (!ctx) return;
            const now = ctx.currentTime;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(330, now);
            osc.frequency.linearRampToValueAtTime(660, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.12);
        }

        // --- Touch handlers ---
        _onTouchStart(e) {
            if (e.touches.length !== 1) return;
            const t = e.touches[0];
            this.touchStartPos = { x: t.clientX, y: t.clientY };
            this.touchStartTime = Date.now();
        }

        _onTouchMove(e) {
            e.preventDefault(); // 阻止页面滚动
        }

        _onTouchEnd(e) {
            if (!this.touchStartPos) return;
            const end = e.changedTouches[0];
            const dx = end.clientX - this.touchStartPos.x;
            const dy = end.clientY - this.touchStartPos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            this.touchStartPos = null;

            // 滑动阈值: 20px → 方向控制
            if (dist >= 20) {
                const dir = Math.abs(dx) >= Math.abs(dy)
                    ? (dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 })
                    : (dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
                this._handleDirectionInput(dir);
            }
            // 短按不做任何操作（由按钮处理开始/重启）
        }

        // 方向输入统一处理（键盘和触屏共用）
        _handleDirectionInput(candidate) {
            // In initial state: any direction starts the game
            if (this.state === 'initial') {
                this.nextDirection = candidate;
                this.startGame();
                return;
            }
            // In playing state: validate and buffer direction
            if (this.state === 'playing' && !this.isPaused) {
                // Anti-180 check against current direction
                if (
                    candidate.x + this.direction.x === 0 &&
                    candidate.y + this.direction.y === 0
                ) return;
                // Don't buffer the same direction
                if (
                    candidate.x === this.nextDirection.x &&
                    candidate.y === this.nextDirection.y
                ) return;
                this.nextDirection = candidate;
            }
        }

        resetState() {
            this.direction = { x: 0, y: 0 };
            this.nextDirection = { x: 0, y: 0 };
            this.score = 0;
            this.state = 'initial';
            this.isPaused = false;

            const cx = Math.floor(this.tileCount / 2);
            const cy = Math.floor(this.tileCount / 2);
            this.snake = [
                { x: cx, y: cy },
                { x: cx - 1, y: cy },
                { x: cx - 2, y: cy },
            ];

            this.generateWalls();
            this.spawnFood();
        }

        generateWalls() {
            this.walls = [];
            const cfg = SnakeGame.DIFFICULTY[this.difficulty];
            const [minCount, maxCount] = cfg.wallCount;
            const targetCount = minCount + Math.floor(Math.random() * (maxCount - minCount + 1));
            const occupied = new Set(
                this.snake.map(seg => `${seg.x},${seg.y}`)
            );

            if (cfg.wallMode === 'scattered') {
                // Place individual random tiles
                let placed = 0;
                let attempts = 0;
                const maxAttempts = targetCount * 20;
                while (placed < targetCount && attempts < maxAttempts) {
                    const wx = Math.floor(Math.random() * this.tileCount);
                    const wy = Math.floor(Math.random() * this.tileCount);
                    const key = `${wx},${wy}`;
                    if (!occupied.has(key)) {
                        this.walls.push({ x: wx, y: wy });
                        occupied.add(key);
                        placed++;
                    }
                    attempts++;
                }
            } else {
                // Connected mode: place line segments
                const [minLen, maxLen] = cfg.wallSegLen;
                let placed = 0;
                let attempts = 0;
                const maxAttempts = targetCount * 30;
                while (placed < targetCount && attempts < maxAttempts) {
                    const sx = Math.floor(Math.random() * this.tileCount);
                    const sy = Math.floor(Math.random() * this.tileCount);
                    const horizontal = Math.random() < 0.5;
                    const dx = horizontal ? 1 : 0;
                    const dy = horizontal ? 0 : 1;
                    const len = minLen + Math.floor(Math.random() * (maxLen - minLen + 1));

                    // Validate the whole segment first
                    const segment = [];
                    for (let i = 0; i < len; i++) {
                        const wx = sx + dx * i;
                        const wy = sy + dy * i;
                        if (wx < 0 || wx >= this.tileCount || wy < 0 || wy >= this.tileCount) break;
                        const key = `${wx},${wy}`;
                        if (occupied.has(key)) break;
                        segment.push({ x: wx, y: wy });
                    }

                    // Only place if full segment fits
                    if (segment.length === len) {
                        for (const tile of segment) {
                            this.walls.push(tile);
                            occupied.add(`${tile.x},${tile.y}`);
                        }
                        placed++;
                    }
                    attempts++;
                }
            }
        }

        loadDifficulty() {
            try {
                const saved = localStorage.getItem('snake_difficulty');
                if (saved && SnakeGame.DIFFICULTY[saved]) return saved;
            } catch { /* ignore */ }
            return 'easy';
        }

        saveDifficulty() {
            try {
                localStorage.setItem('snake_difficulty', this.difficulty);
            } catch { /* ignore */ }
        }

        startGame() {
            this.state = 'playing';
            this.isPaused = false;
            this.pauseBtn.textContent = '⏸️';
            this.pauseBtn.classList.add('visible');
            this.quitBtn.classList.add('visible');
            this.speed = SnakeGame.DIFFICULTY[this.difficulty].speed;
            this.overlay.classList.add('hidden');
            if (this.gameLoopId) clearInterval(this.gameLoopId);
            this.gameLoopId = setInterval(() => this.gameStep(), this.speed);
            this.playStartSound();
        }

        togglePause() {
            if (this.state !== 'playing') return;
            if (this.isPaused) {
                this.resumeGame();
            } else {
                this.pauseGame();
            }
        }

        pauseGame() {
            this.isPaused = true;
            this.pauseBtn.textContent = '▶️';
            if (this.gameLoopId) {
                clearInterval(this.gameLoopId);
                this.gameLoopId = null;
            }
            this.showPauseOverlay();
        }

        resumeGame() {
            this.isPaused = false;
            this.pauseBtn.textContent = '⏸️';
            this.overlay.classList.add('hidden');
            this.gameLoopId = setInterval(() => this.gameStep(), this.speed);
        }

        showPauseOverlay() {
            this.overlay.classList.remove('hidden');
            this.overlay.classList.add('clickable');
            this.overlay.innerHTML = `
                <div class="message">⏸️ 已暂停</div>
                <button id="resume-btn">▶ 继续游戏</button>
                <button id="home-btn-pause">🏠 返回主页</button>
                ${this.isMobile ? '' : '<div class="hint">按 P / Esc 继续  |  空格键重新开始</div>'}
            `;
            const resumeBtn = document.getElementById('resume-btn');
            if (resumeBtn) resumeBtn.addEventListener('click', () => this.togglePause());
            const homeBtn = document.getElementById('home-btn-pause');
            if (homeBtn) homeBtn.addEventListener('click', () => this.restart());
        }

        gameStep() {
            if (this.state !== 'playing' || this.isPaused) return;

            // Apply buffered direction
            this.direction = { ...this.nextDirection };

            // Compute new head position
            const head = this.snake[0];
            const newHead = {
                x: head.x + this.direction.x,
                y: head.y + this.direction.y,
            };

            // Wall collision
            if (
                newHead.x < 0 || newHead.x >= this.tileCount ||
                newHead.y < 0 || newHead.y >= this.tileCount
            ) {
                this.endGame();
                return;
            }

            // Self-collision (exclude tail, which will be removed unless growing)
            const bodyToCheck = this.snake.slice(0, -1);
            if (bodyToCheck.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
                this.endGame();
                return;
            }

            // Wall collision
            if (this.walls.some(w => w.x === newHead.x && w.y === newHead.y)) {
                this.endGame();
                return;
            }

            // Move snake: add new head
            this.snake.unshift(newHead);

            // Check food
            if (newHead.x === this.food.x && newHead.y === this.food.y) {
                this.score++;
                this.spawnFood();
                this.playEatSound();
                // Don't pop tail -> snake grows
            } else {
                this.snake.pop();
            }

            this.render();
        }

        endGame() {
            this.state = 'gameover';
            this.pauseBtn.classList.remove('visible');
            this.quitBtn.classList.remove('visible');
            if (this.gameLoopId) {
                clearInterval(this.gameLoopId);
                this.gameLoopId = null;
            }
            this.render();
            this.playDeathSound();
            this.handleGameOver('游戏结束', `得分: ${this.score}`, this.isMobile ? '点击下方按钮重新开始' : '按空格键重新开始');
        }

        handleGameOver(title, subtitle, hint) {
            const { scores, newEntry } = this.saveScore(this.score);
            const lbHTML = this.buildLeaderboardHTML(scores, newEntry, this.score, this.difficulty);
            const btnHTML = '<button id="restart-btn">↻ 重新开始</button><button id="home-btn-over">🏠 返回主页</button>';

            this.showOverlay(title, subtitle, hint, lbHTML + btnHTML);
            this.overlay.classList.add('clickable');

            const btn = document.getElementById('restart-btn');
            if (btn) btn.addEventListener('click', () => this.restart());
            const homeBtn = document.getElementById('home-btn-over');
            if (homeBtn) homeBtn.addEventListener('click', () => this.restart());
        }

        spawnFood() {
            const occupied = new Set(
                this.snake.map(seg => `${seg.x},${seg.y}`)
            );
            // Also exclude wall tiles
            for (const w of this.walls) {
                occupied.add(`${w.x},${w.y}`);
            }

            const totalCells = this.tileCount * this.tileCount;
            if (occupied.size >= totalCells) {
                // Player filled the entire grid — you win!
                this.state = 'gameover';
                if (this.gameLoopId) {
                    clearInterval(this.gameLoopId);
                    this.gameLoopId = null;
                }
                this.render();
                this.handleGameOver('🎉 恭喜通关！', `得分: ${this.score}`, this.isMobile ? '点击下方按钮重新开始' : '按空格键重新开始');
                return;
            }

            let pos = null;
            let attempts = 0;
            const maxRandomAttempts = 500;
            while (attempts < maxRandomAttempts) {
                const candidate = {
                    x: Math.floor(Math.random() * this.tileCount),
                    y: Math.floor(Math.random() * this.tileCount),
                };
                if (!occupied.has(`${candidate.x},${candidate.y}`)) {
                    pos = candidate;
                    break;
                }
                attempts++;
            }

            // 随机未命中时，遍历所有格子找第一个空闲位置作为兜底
            if (!pos) {
                for (let x = 0; x < this.tileCount; x++) {
                    for (let y = 0; y < this.tileCount; y++) {
                        if (!occupied.has(`${x},${y}`)) {
                            pos = { x, y };
                            break;
                        }
                    }
                    if (pos) break;
                }
            }

            this.food = pos;
        }

        getHighScores() {
            try {
                return JSON.parse(localStorage.getItem('snake_high_scores') || '[]');
            } catch {
                return [];
            }
        }

        formatDateTime() {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
        }

        saveScore(score) {
            const scores = this.getHighScores();
            const newEntry = {
                score,
                date: this.formatDateTime(),
                difficulty: SnakeGame.DIFFICULTY[this.difficulty].label,
                diffKey: this.difficulty,
            };
            scores.push(newEntry);
            scores.sort((a, b) => b.score - a.score);
            const top = scores.slice(0, 10);
            try {
                localStorage.setItem('snake_high_scores', JSON.stringify(top));
            } catch { /* storage full — ignore */ }
            return { scores: top, newEntry };
        }

        buildLeaderboardHTML(scores, newEntry, currentScore, currentDiff) {
            let html = '<div class="leaderboard"><h3>🏆 排行榜</h3>';

            // Current game row at top
            const diffCfg = SnakeGame.DIFFICULTY[currentDiff];
            const diffLabel = diffCfg ? diffCfg.label : currentDiff;
            html += '<div class="current-game-row">';
            html += `<span class="cg-label">🎯 本局</span>`;
            html += `<span class="cg-info">得分: <span class="cg-score">${currentScore}</span>&nbsp;&nbsp;<span class="diff-label diff-${currentDiff}">${diffLabel}</span></span>`;
            html += '</div>';

            if (!scores.length) {
                html += '<div class="hint" style="padding:10px;">暂无记录，快来挑战！</div>';
            } else {
                html += '<ol>';
                for (let i = 0; i < scores.length; i++) {
                    const entry = scores[i];
                    const isCurrent = entry === newEntry;
                    const cls = isCurrent ? ' class="current"' : '';
                    // Rank medal class for top 3
                    let rankCls = '';
                    if (i === 0) rankCls = ' rank-1';
                    else if (i === 1) rankCls = ' rank-2';
                    else if (i === 2) rankCls = ' rank-3';

                    html += `<li${cls}>`;
                    html += `<span class="rank${rankCls}">#${i + 1}</span>`;
                    html += `<span class="info"><span class="datetime">${entry.date}</span>&nbsp;<span class="diff-label diff-${entry.diffKey || 'medium'}">${entry.difficulty}</span></span>`;
                    html += `<span class="score-val">${entry.score}</span>`;
                    html += `</li>`;
                }
                html += '</ol>';
            }
            html += '</div>';
            return html;
        }

        showOverlay(title, subtitle, hint, extraHTML = '') {
            this.overlay.classList.remove('hidden');
            this.overlay.innerHTML = `
                <div class="message">${title}</div>
                <div class="score-display">${subtitle}</div>
                <div class="hint">${hint}</div>
                ${extraHTML}
            `;
        }

        showInitialOverlay() {
            const diffs = SnakeGame.DIFFICULTY;
            let btnsHTML = '<div class="diff-btns">';
            for (const [key, cfg] of Object.entries(diffs)) {
                const active = key === this.difficulty ? ' active' : '';
                btnsHTML += `<button class="diff-btn${active}" data-diff="${key}">${cfg.label}</button>`;
            }
            btnsHTML += '</div>';

            this.overlay.classList.remove('hidden');
            this.overlay.classList.add('clickable');
            this.overlay.innerHTML = `
                <div class="message">🐍 贪吃蛇</div>
                ${btnsHTML}
                <button id="start-btn">开始游戏</button>
                <div class="hint">${this.isMobile ? '选择难度，点击「开始游戏」' : '↑↓←→ / WASD 开始  |  1-4 切换难度'}</div>
            `;

            // Bind difficulty button clicks
            this.overlay.querySelectorAll('.diff-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.setDifficulty(btn.dataset.diff);
                });
            });

            // Bind start button
            const startBtn = document.getElementById('start-btn');
            if (startBtn) {
                startBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._handleDirectionInput({ x: 1, y: 0 });
                });
            }
        }

        setDifficulty(diff) {
            if (!SnakeGame.DIFFICULTY[diff]) return;
            this.difficulty = diff;
            this.saveDifficulty();
            // Regenerate walls and food for new difficulty
            this.generateWalls();
            this.spawnFood();
            this.render();
            // Update button highlights
            this.overlay.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.diff === diff);
            });
        }

        render() {
            const { ctx, canvas, tileSize, tileCount, snake, food, score } = this;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw subtle grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                const pos = i * tileSize;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            const gap = 1;
            const bodySize = tileSize - gap * 2;

            // Draw walls
            const { walls } = this;
            for (const w of walls) {
                const wx = w.x * tileSize + gap;
                const wy = w.y * tileSize + gap;
                ctx.fillStyle = '#30363d';
                ctx.fillRect(wx, wy, bodySize, bodySize);
                // inner cross pattern for brick texture
                ctx.strokeStyle = '#21262d';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(wx, wy);
                ctx.lineTo(wx + bodySize, wy + bodySize);
                ctx.moveTo(wx + bodySize, wy);
                ctx.lineTo(wx, wy + bodySize);
                ctx.stroke();
            }

            // Draw snake body (tail to head, so head draws on top)

            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i];
                const px = seg.x * tileSize + gap;
                const py = seg.y * tileSize + gap;

                if (i === 0) {
                    // Head — bright green
                    ctx.fillStyle = '#3fb950';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = 'rgba(63, 185, 80, 0.4)';
                } else {
                    // Body — gradient from green to darker teal
                    const t = i / Math.max(snake.length - 1, 1);
                    const r = Math.round(46 + t * 10);
                    const g = Math.round(160 + t * 30);
                    const b = Math.round(67 - t * 20);
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';
                }

                // Rounded rectangle for each segment
                const radius = tileSize * 0.2;
                ctx.beginPath();
                ctx.moveTo(px + radius, py);
                ctx.lineTo(px + bodySize - radius, py);
                ctx.quadraticCurveTo(px + bodySize, py, px + bodySize, py + radius);
                ctx.lineTo(px + bodySize, py + bodySize - radius);
                ctx.quadraticCurveTo(px + bodySize, py + bodySize, px + bodySize - radius, py + bodySize);
                ctx.lineTo(px + radius, py + bodySize);
                ctx.quadraticCurveTo(px, py + bodySize, px, py + bodySize - radius);
                ctx.lineTo(px, py + radius);
                ctx.quadraticCurveTo(px, py, px + radius, py);
                ctx.closePath();
                ctx.fill();

                // Head eyes
                if (i === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffffff';
                    const eyeR = tileSize * 0.12;
                    let ex1, ey1, ex2, ey2;
                    const dir = this.direction.x !== 0 || this.direction.y !== 0
                        ? this.direction
                        : { x: 1, y: 0 }; // default look right in initial state

                    const cx = seg.x * tileSize + tileSize / 2;
                    const cy = seg.y * tileSize + tileSize / 2;
                    const eyeOffset = tileSize * 0.25;

                    if (dir.x === 1) { // right
                        ex1 = cx + eyeOffset; ey1 = cy - eyeOffset;
                        ex2 = cx + eyeOffset; ey2 = cy + eyeOffset;
                    } else if (dir.x === -1) { // left
                        ex1 = cx - eyeOffset; ey1 = cy - eyeOffset;
                        ex2 = cx - eyeOffset; ey2 = cy + eyeOffset;
                    } else if (dir.y === -1) { // up
                        ex1 = cx - eyeOffset; ey1 = cy - eyeOffset;
                        ex2 = cx + eyeOffset; ey2 = cy - eyeOffset;
                    } else { // down
                        ex1 = cx - eyeOffset; ey1 = cy + eyeOffset;
                        ex2 = cx + eyeOffset; ey2 = cy + eyeOffset;
                    }

                    ctx.beginPath();
                    ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Reset shadow
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            // Draw food — glowing red circle
            const fx = food.x * tileSize + tileSize / 2;
            const fy = food.y * tileSize + tileSize / 2;
            const foodR = tileSize / 2 - gap - 1;

            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(248, 81, 73, 0.5)';
            ctx.fillStyle = '#f85149';
            ctx.beginPath();
            ctx.arc(fx, fy, foodR, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Food inner highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.beginPath();
            ctx.arc(fx - foodR * 0.25, fy - foodR * 0.25, foodR * 0.35, 0, Math.PI * 2);
            ctx.fill();

            // Score — top center, bright red, 1.5x size
            ctx.fillStyle = '#f85149';
            ctx.font = `bold ${Math.max(14, tileSize * 0.7) * 1.5}px "Courier New", monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(`得分: ${score}`, canvas.width / 2, 8);
        }

        handleKeyDown(e) {
            const key = e.key;

            // Map key to direction vector
            const inputMap = {
                'ArrowUp':    { x: 0, y: -1 },
                'ArrowDown':  { x: 0, y: 1 },
                'ArrowLeft':  { x: -1, y: 0 },
                'ArrowRight': { x: 1, y: 0 },
                'w': { x: 0, y: -1 },
                'W': { x: 0, y: -1 },
                's': { x: 0, y: 1 },
                'S': { x: 0, y: 1 },
                'a': { x: -1, y: 0 },
                'A': { x: -1, y: 0 },
                'd': { x: 1, y: 0 },
                'D': { x: 1, y: 0 },
            };

            // Prevent scrolling for arrow keys and space
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                e.preventDefault();
            }

            // Pause toggle: P or Escape (playing or paused state)
            if ((key === 'p' || key === 'P' || key === 'Escape') && this.state === 'playing') {
                e.preventDefault();
                this.togglePause();
                return;
            }

            // Space to restart from paused state
            if (key === ' ' && this.isPaused) {
                e.preventDefault();
                this.restart();
                return;
            }

            // Block all other keys while paused
            if (this.isPaused) return;

            // Difficulty switch via number keys (only in initial state)
            if (this.state === 'initial' && ['1', '2', '3', '4'].includes(key)) {
                const map = { '1': 'easy', '2': 'medium', '3': 'hard', '4': 'hell' };
                this.setDifficulty(map[key]);
                return;
            }

            // Space to restart from gameover (or initial)
            if (key === ' ' && (this.state === 'gameover' || this.state === 'initial')) {
                this.restart();
                return;
            }

            const candidate = inputMap[key];
            if (!candidate) return;

            this._handleDirectionInput(candidate);
        }

        restart() {
            if (this.gameLoopId) {
                clearInterval(this.gameLoopId);
                this.gameLoopId = null;
            }
            this.isPaused = false;
            this.pauseBtn.classList.remove('visible');
            this.quitBtn.classList.remove('visible');
            this.resetState();
            this.render();
            this.showInitialOverlay();
        }

        resizeCanvas() {
            const maxSize = Math.min(window.innerWidth, window.innerHeight) * 0.88;
            const clampedSize = Math.max(300, Math.min(600, maxSize));
            const tileSize = Math.floor(clampedSize / SnakeGame.TILE_COUNT);
            const canvasSize = tileSize * SnakeGame.TILE_COUNT;

            this.canvas.width = canvasSize;
            this.canvas.height = canvasSize;
            this.tileSize = tileSize;
            this.tileCount = SnakeGame.TILE_COUNT;

            this.render();
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
        new SnakeGame();
    });
    </script>
</body>
</html>
